<!DOCTYPE html>
<html>
<head>
  <title>Domino Table - 3D View</title>
  <style>
    body { margin: 0; overflow: hidden; }
    canvas { display: block; }
    #info {
      position: absolute; bottom: 10px; left: 10px;
      color: #aaa; font-family: monospace; font-size: 13px;
      pointer-events: none;
    }
  </style>
</head>
<body>
<div id="info">Click: enable | WASD: walk | Mouse: look | Shift: run | Space: rise | Ctrl: lower | ESC: release</div>
<div id="crosshair" style="position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);color:#fff;font-size:24px;pointer-events:none;display:none;">+</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ========== SCENE SETUP ==========
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a1a2e);

// Eye height: floor is at -700, standing person ~1700mm tall, eyes at ~1600
const FLOOR_Z = -700;
const EYE_HEIGHT = 1600;
const CAM_Z = FLOOR_Z + EYE_HEIGHT;

const camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 1, 8000);
camera.position.set(0, -1800, CAM_Z);
camera.up.set(0, 0, 1); // Z is up in this scene

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
document.body.appendChild(renderer.domElement);

// ========== FPS GROUND-LOCKED CONTROLS ==========
const crosshair = document.getElementById('crosshair');
let isLocked = false;
let yaw = Math.PI / 2;   // horizontal angle (start facing +Y toward table)
let pitch = -0.4;         // vertical angle (slightly looking down at table)
const PITCH_MAX = Math.PI / 2 - 0.05;

// Pointer lock
document.body.addEventListener('click', () => {
  if (!isLocked) renderer.domElement.requestPointerLock();
});
document.addEventListener('pointerlockchange', () => {
  isLocked = document.pointerLockElement === renderer.domElement;
  crosshair.style.display = isLocked ? 'block' : 'none';
});

// Mouse look
document.addEventListener('mousemove', (e) => {
  if (!isLocked) return;
  yaw   -= e.movementX * 0.002;
  pitch -= e.movementY * 0.002;
  pitch = Math.max(-PITCH_MAX, Math.min(PITCH_MAX, pitch));
});

// Movement state
const moveState = { forward: false, backward: false, left: false, right: false, sprint: false, up: false, down: false };
const walkSpeed = 600;
const clock = new THREE.Clock();

window.addEventListener('keydown', (e) => {
  switch (e.code) {
    case 'KeyW': case 'ArrowUp':    moveState.forward = true; break;
    case 'KeyS': case 'ArrowDown':  moveState.backward = true; break;
    case 'KeyA': case 'ArrowLeft':  moveState.left = true; break;
    case 'KeyD': case 'ArrowRight': moveState.right = true; break;
    case 'ShiftLeft': case 'ShiftRight': moveState.sprint = true; break;
    case 'Space':        moveState.up = true; e.preventDefault(); break;
    case 'ControlLeft': case 'ControlRight': moveState.down = true; break;
  }
});
window.addEventListener('keyup', (e) => {
  switch (e.code) {
    case 'KeyW': case 'ArrowUp':    moveState.forward = false; break;
    case 'KeyS': case 'ArrowDown':  moveState.backward = false; break;
    case 'KeyA': case 'ArrowLeft':  moveState.left = false; break;
    case 'KeyD': case 'ArrowRight': moveState.right = false; break;
    case 'ShiftLeft': case 'ShiftRight': moveState.sprint = false; break;
    case 'Space':        moveState.up = false; break;
    case 'ControlLeft': case 'ControlRight': moveState.down = false; break;
  }
});

// ========== LIGHTS ==========
const ambient = new THREE.AmbientLight(0xffffff, 0.5);
scene.add(ambient);

const spot = new THREE.SpotLight(0xffffff, 0.7);
spot.position.set(0, 0, 2000);
spot.castShadow = true;
scene.add(spot);

const fill = new THREE.PointLight(0xffffff, 0.3);
fill.position.set(-800, -800, 600);
scene.add(fill);

// ========== MATERIALS ==========
const woodMat = new THREE.MeshPhongMaterial({ color: 0x8B4513 });
const feltMat = new THREE.MeshPhongMaterial({ color: 0x006400 });
const railMat = new THREE.MeshPhongMaterial({ color: 0x5C3317 });
const ivoryMat = new THREE.MeshPhongMaterial({ color: 0xFFFFF0 });
const blackMat = new THREE.MeshPhongMaterial({ color: 0x111111 });
const chairMat = new THREE.MeshPhongMaterial({ color: 0xCD853F });
const rackMat = new THREE.MeshPhongMaterial({ color: 0x8B4513 });

// Pip colors from TX-Dom-Dev
const pipColors = [
  0x141416, 0x36B258, 0xF0C73D, 0xE74C3C,
  0x00B2FF, 0x9B59B6, 0xA76E34, 0x3B82F6
];

// ========== CONSTANTS ==========
const TABLE_RADIUS = 900;
const TOP_THICKNESS = 45;
const RAIL_WIDTH = 120;
const FELT_DEPTH = 3;
const LEG_HEIGHT = 700;
const APOTHEM = TABLE_RADIUS * Math.cos(Math.PI / 6);

// ========== HEXAGONAL SHAPE HELPER ==========
function hexShape(radius, offsetDeg) {
  const shape = new THREE.Shape();
  for (let i = 0; i < 6; i++) {
    const angle = (i * 60 + offsetDeg) * Math.PI / 180;
    const x = radius * Math.cos(angle);
    const y = radius * Math.sin(angle);
    if (i === 0) shape.moveTo(x, y);
    else shape.lineTo(x, y);
  }
  shape.closePath();
  return shape;
}

// ========== TABLE ==========
function createTable() {
  const group = new THREE.Group();

  // Rail (full hex)
  const topGeo = new THREE.ExtrudeGeometry(hexShape(TABLE_RADIUS, 30), { depth: TOP_THICKNESS, bevelEnabled: false });
  const top = new THREE.Mesh(topGeo, railMat);
  top.receiveShadow = true;
  group.add(top);

  // Felt
  const feltGeo = new THREE.ExtrudeGeometry(hexShape(TABLE_RADIUS - RAIL_WIDTH, 30), { depth: FELT_DEPTH, bevelEnabled: false });
  const felt = new THREE.Mesh(feltGeo, feltMat);
  felt.position.z = TOP_THICKNESS - FELT_DEPTH + 1;
  felt.receiveShadow = true;
  group.add(felt);

  // Legs
  const legGeo = new THREE.BoxGeometry(65, 65, LEG_HEIGHT);
  const legR = TABLE_RADIUS - 120;
  for (let i = 0; i < 6; i++) {
    const angle = (i * 60 + 30) * Math.PI / 180;
    const leg = new THREE.Mesh(legGeo, woodMat);
    leg.position.set(legR * Math.cos(angle), legR * Math.sin(angle), -LEG_HEIGHT / 2);
    leg.castShadow = true;
    group.add(leg);
  }

  // Floor
  const floorGeo = new THREE.PlaneGeometry(6000, 6000);
  const floorMat = new THREE.MeshPhongMaterial({ color: 0x2a2a3e });
  const floor = new THREE.Mesh(floorGeo, floorMat);
  floor.position.z = -LEG_HEIGHT;
  floor.receiveShadow = true;
  group.add(floor);

  return group;
}

// ========== CHAIR ==========
function createChair() {
  const group = new THREE.Group();
  const sw = 450, sd = 450, st = 40, sh = 450, bh = 500, bt = 30, cls = 40;

  // Seat
  const seatGeo = new THREE.BoxGeometry(sd, sw, st);
  const seat = new THREE.Mesh(seatGeo, chairMat);
  seat.position.set(0, 0, sh - st / 2);
  group.add(seat);

  // Backrest
  const backGeo = new THREE.BoxGeometry(bt, sw, bh);
  const back = new THREE.Mesh(backGeo, chairMat);
  back.position.set(sd / 2 - bt / 2, 0, sh + bh / 2);
  group.add(back);

  // Legs
  const legGeo = new THREE.BoxGeometry(cls, cls, sh - st);
  const positions = [
    [-sd/2 + cls/2, -sw/2 + cls/2],
    [sd/2 - cls/2, -sw/2 + cls/2],
    [-sd/2 + cls/2, sw/2 - cls/2],
    [sd/2 - cls/2, sw/2 - cls/2]
  ];
  for (const [x, y] of positions) {
    const leg = new THREE.Mesh(legGeo, chairMat);
    leg.position.set(x, y, (sh - st) / 2);
    leg.castShadow = true;
    group.add(leg);
  }

  return group;
}

// ========== DOMINO (OpenSCAD-inspired design) ==========
// Dimensions: 48 x 24 x 10mm with 2mm bevel
const DOM_L = 48, DOM_W = 24, DOM_H = 10, DOM_BEVEL = 2;
const PIP_R = 2.5, PIP_DEPTH = 1.8, HOLE_DEPTH = 4;
const GROOVE_W = 2.5, GROOVE_LEN = 17.5, GROOVE_DEPTH = 0.7;
const CONCAVE_DEPTH = 1.8;

const pipGrid = {
  TL: [-3.75,  3.75], T: [-3.75, 0], TR: [-3.75, -3.75],
  L:  [0,      3.75], C: [0,     0], R:  [0,     -3.75],
  BL: [3.75,   3.75], B: [3.75,  0], BR: [3.75,  -3.75]
};
const pipLayouts = [
  [],
  ['C'],
  ['TR', 'BL'],
  ['TR', 'C', 'BL'],
  ['TL', 'TR', 'BL', 'BR'],
  ['TL', 'TR', 'C', 'BL', 'BR'],
  ['TL', 'TR', 'L', 'R', 'BL', 'BR'],
  ['TL', 'TR', 'L', 'C', 'R', 'BL', 'BR']
];

// Rounded box geometry (like minkowski in OpenSCAD)
function createRoundedBox(w, h, d, r, segments) {
  const shape = new THREE.Shape();
  const x = w/2 - r, y = h/2 - r;
  shape.moveTo(-x, -h/2);
  shape.lineTo(x, -h/2);
  shape.quadraticCurveTo(w/2, -h/2, w/2, -y);
  shape.lineTo(w/2, y);
  shape.quadraticCurveTo(w/2, h/2, x, h/2);
  shape.lineTo(-x, h/2);
  shape.quadraticCurveTo(-w/2, h/2, -w/2, y);
  shape.lineTo(-w/2, -y);
  shape.quadraticCurveTo(-w/2, -h/2, -x, -h/2);
  const geo = new THREE.ExtrudeGeometry(shape, {
    depth: d - 2*r, bevelEnabled: true,
    bevelThickness: r, bevelSize: r, bevelSegments: segments || 3
  });
  geo.translate(0, 0, -(d - 2*r)/2 - r);
  return geo;
}

// Concave depression geometry (sphere cap approximation)
function createConcavePip(radius, depth, segs) {
  const sphereR = (radius*radius + depth*depth) / (2*depth);
  const geo = new THREE.SphereGeometry(sphereR, segs || 24, segs || 24,
    0, Math.PI*2, 0, Math.asin(radius/sphereR));
  geo.rotateX(Math.PI);
  return geo;
}

function createDomino(leftVal, rightVal) {
  const group = new THREE.Group();
  const topZ = DOM_H / 2;

  // 1. Ivory rounded body
  const bodyGeo = createRoundedBox(DOM_L, DOM_W, DOM_H, DOM_BEVEL, 4);
  const body = new THREE.Mesh(bodyGeo, ivoryMat);
  body.castShadow = true;
  group.add(body);

  // 2. Pip holes — dark cylinders inset into the ivory surface
  const holeGeo = new THREE.CylinderGeometry(PIP_R, PIP_R, HOLE_DEPTH, 24);
  const holeMat = new THREE.MeshPhongMaterial({ color: 0x0a0a0a });

  // 3. Colored concave pads — sit inside the holes, visible from above
  const concaveGeo = createConcavePip(PIP_R - 0.2, CONCAVE_DEPTH, 20);

  function addPips(val, xOffset) {
    if (val === 0) return;
    const pipMat = new THREE.MeshPhongMaterial({ color: pipColors[val] });
    for (const name of pipLayouts[val]) {
      const [px, py] = pipGrid[name];

      // Dark hole cylinder (recessed into body)
      const hole = new THREE.Mesh(holeGeo, holeMat);
      hole.position.set(xOffset + px, py, topZ - HOLE_DEPTH/2 + 0.05);
      group.add(hole);

      // Colored pad at bottom of hole
      const pad = new THREE.Mesh(concaveGeo, pipMat);
      pad.position.set(xOffset + px, py, topZ - HOLE_DEPTH + 0.5);
      group.add(pad);
    }
  }

  addPips(leftVal, -DOM_L/4);
  addPips(rightVal, DOM_L/4);

  // 4. Pill-shaped center groove (like hull of two cylinders in OpenSCAD)
  const grooveGroup = new THREE.Group();
  // Main groove channel — dark recessed area
  const groovePath = new THREE.Shape();
  const gr = GROOVE_W / 2;
  const gl = GROOVE_LEN / 2;
  groovePath.moveTo(-gl, -gr);
  groovePath.lineTo(gl, -gr);
  groovePath.arc(0, gr, gr, -Math.PI/2, Math.PI/2);
  groovePath.lineTo(-gl, gr);
  groovePath.arc(0, -gr, gr, Math.PI/2, -Math.PI/2);
  const grooveExtGeo = new THREE.ExtrudeGeometry(groovePath, {
    depth: HOLE_DEPTH, bevelEnabled: false
  });
  grooveExtGeo.rotateX(Math.PI/2);
  const grooveMesh = new THREE.Mesh(grooveExtGeo, blackMat);
  grooveMesh.position.set(0, gl, topZ - HOLE_DEPTH + 0.05);
  grooveMesh.rotation.z = Math.PI/2;
  grooveGroup.add(grooveMesh);

  // Groove concave surface — dark depression on top
  const grooveSurfR = (gr*gr + GROOVE_DEPTH*GROOVE_DEPTH) / (2*GROOVE_DEPTH);
  const grooveSurfGeo = new THREE.CylinderGeometry(gr - 0.1, gr - 0.1, GROOVE_LEN, 24, 1, true);
  const grooveSurf = new THREE.Mesh(grooveSurfGeo, blackMat);
  grooveSurf.position.set(0, 0, topZ - 0.3);
  grooveSurf.rotation.x = Math.PI/2;
  grooveGroup.add(grooveSurf);

  group.add(grooveGroup);

  return group;
}

// ========== RACK ==========
function createRack() {
  const group = new THREE.Group();
  const rackLen = 170, rackDep = 29, baseH = 6;
  const backH = 38, backT = 4;
  const lipH = 8, lipT = 3;
  const guardH = 58, guardT = 3, guardDep = 39;
  const leanRad = 12 * Math.PI / 180;

  // Base
  const baseGeo = new THREE.BoxGeometry(rackLen, rackDep, baseH);
  const base = new THREE.Mesh(baseGeo, rackMat);
  base.position.z = baseH / 2;
  group.add(base);

  // Back wall
  const backGeo = new THREE.BoxGeometry(rackLen, backT, backH);
  const back = new THREE.Mesh(backGeo, rackMat);
  back.position.set(0, rackDep/2 - backT/2 - 12, baseH + backH/2);
  back.rotation.x = -leanRad;
  group.add(back);

  // Front lip
  const lipGeo = new THREE.BoxGeometry(rackLen, lipT, lipH);
  const lip = new THREE.Mesh(lipGeo, rackMat);
  lip.position.set(0, -rackDep/2 + lipT/2, baseH + lipH/2);
  group.add(lip);

  // Guards
  for (const side of [-1, 1]) {
    const guardGeo = new THREE.BoxGeometry(guardT, guardDep, guardH);
    const guard = new THREE.Mesh(guardGeo, rackMat);
    guard.position.set(side * (rackLen/2 - guardT/2), -10, baseH + guardH/2);
    guard.rotation.x = -leanRad;
    group.add(guard);
  }

  return group;
}

// ========== STANDING DOMINO IN RACK ==========
function createStandingDomino(leftVal, rightVal) {
  const dom = createDomino(leftVal, rightVal);
  // Stand upright, lean back slightly
  dom.rotation.x = (90 - 12) * Math.PI / 180;
  dom.rotation.z = Math.PI / 2;
  return dom;
}

// ========== BUILD SCENE ==========
scene.add(createTable());

// Chairs — at flat edges (no 30° offset)
const chairDist = APOTHEM + 80 + 225;
for (let i = 0; i < 6; i++) {
  const angle = i * 60 * Math.PI / 180;
  const chair = createChair();
  chair.position.set(
    chairDist * Math.cos(angle),
    chairDist * Math.sin(angle),
    -LEG_HEIGHT
  );
  chair.rotation.z = angle;
  scene.add(chair);
}

// Hands
const hands = [
  [[5,5], [5,3], [5,2], [5,0], [5,1], [5,7]],
  [[3,7], [1,4], [0,6], [2,7], [6,1], [4,4]],
  [[4,7], [0,2], [7,7], [1,7], [3,6], [2,4]],
  [[6,6], [0,3], [2,2], [3,4], [4,6], [1,1]],
  [[0,7], [3,5], [0,1], [2,3], [4,5], [6,7]],
  [[0,4], [1,2], [1,3], [5,6], [3,3], [2,6]]
];

// Racks with dominoes — at flat edges (30° offset to match table)
const rackDist = APOTHEM - 60;
for (let seat = 0; seat < 6; seat++) {
  const angle = seat * 60 * Math.PI / 180;
  const rackGroup = new THREE.Group();

  // Rack
  const rack = createRack();
  rackGroup.add(rack);

  // 6 dominoes standing in rack
  const tileSpacing = 25;
  const startX = -(5) * tileSpacing / 2;
  for (let ti = 0; ti < 6; ti++) {
    const [l, r] = hands[seat][ti];
    const dom = createStandingDomino(l, r);
    dom.position.set(startX + ti * tileSpacing, 3, 6 + 24);
    rackGroup.add(dom);
  }

  // Position rack on table
  rackGroup.position.set(
    rackDist * Math.cos(angle),
    rackDist * Math.sin(angle),
    TOP_THICKNESS
  );
  rackGroup.rotation.z = angle + Math.PI - Math.PI / 2;
  scene.add(rackGroup);
}

// ========== ANIMATION LOOP ==========
function animate() {
  requestAnimationFrame(animate);
  const delta = clock.getDelta();

  if (isLocked) {
    const speed = walkSpeed * (moveState.sprint ? 2.5 : 1) * delta;

    // Forward direction on ground plane (XY only, ignore pitch)
    const fwdX = Math.cos(yaw);
    const fwdY = Math.sin(yaw);
    // Right direction (perpendicular on ground)
    const rightX = Math.cos(yaw - Math.PI / 2);
    const rightY = Math.sin(yaw - Math.PI / 2);

    let moveX = 0, moveY = 0;
    if (moveState.forward)  { moveX += fwdX; moveY += fwdY; }
    if (moveState.backward) { moveX -= fwdX; moveY -= fwdY; }
    if (moveState.left)     { moveX -= rightX; moveY -= rightY; }
    if (moveState.right)    { moveX += rightX; moveY += rightY; }

    // Normalize diagonal movement
    const len = Math.sqrt(moveX * moveX + moveY * moveY);
    if (len > 0) {
      camera.position.x += (moveX / len) * speed;
      camera.position.y += (moveY / len) * speed;
    }

    // Raise/lower perspective
    if (moveState.up) camera.position.z += speed;
    if (moveState.down) camera.position.z -= speed;
  }

  // Update camera look direction from yaw/pitch
  const lookX = Math.cos(pitch) * Math.cos(yaw);
  const lookY = Math.cos(pitch) * Math.sin(yaw);
  const lookZ = Math.sin(pitch);
  camera.lookAt(
    camera.position.x + lookX,
    camera.position.y + lookY,
    camera.position.z + lookZ
  );

  renderer.render(scene, camera);
}
animate();

// ========== RESIZE ==========
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
