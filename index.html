<!DOCTYPE html>
<html>
<head>
  <title>Domino Table - WebGL Demo</title>
  <style>
    body { margin: 0; overflow: hidden; }
    canvas { display: block; }
  </style>
</head>
<body>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ========== SCENE SETUP ==========
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a1a2e);

const camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 1, 5000);
camera.position.set(0, -1200, 900);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
document.body.appendChild(renderer.domElement);

// ========== LIGHTS ==========
const ambient = new THREE.AmbientLight(0xffffff, 0.4);
scene.add(ambient);

const spot = new THREE.SpotLight(0xffffff, 0.8);
spot.position.set(0, 0, 1500);
spot.castShadow = true;
scene.add(spot);

// ========== MATERIALS ==========
const woodMat = new THREE.MeshPhongMaterial({ color: 0x8B4513 });
const feltMat = new THREE.MeshPhongMaterial({ color: 0x006400 });
const ivoryMat = new THREE.MeshPhongMaterial({ color: 0xFFFFF0 });
const blackMat = new THREE.MeshPhongMaterial({ color: 0x111111 });

// Pip colors from TX-Dom-Dev
const pipColors = [
  0x141416, 0x36B258, 0xF0C73D, 0xE74C3C,
  0x00B2FF, 0x9B59B6, 0xA76E34, 0x3B82F6
];

// ========== HEXAGONAL TABLE ==========
function createHexTable() {
  const group = new THREE.Group();

  // Table top
  const hexShape = new THREE.Shape();
  const radius = 900;
  for (let i = 0; i < 6; i++) {
    const angle = (i * 60 + 30) * Math.PI / 180;
    const x = radius * Math.cos(angle);
    const y = radius * Math.sin(angle);
    if (i === 0) hexShape.moveTo(x, y);
    else hexShape.lineTo(x, y);
  }
  hexShape.closePath();

  const topGeo = new THREE.ExtrudeGeometry(hexShape, { depth: 45, bevelEnabled: false });
  const top = new THREE.Mesh(topGeo, woodMat);
  top.receiveShadow = true;
  group.add(top);

  // Felt (slightly smaller hex, on top)
  const feltShape = new THREE.Shape();
  const feltR = radius - 120;
  for (let i = 0; i < 6; i++) {
    const angle = (i * 60 + 30) * Math.PI / 180;
    const x = feltR * Math.cos(angle);
    const y = feltR * Math.sin(angle);
    if (i === 0) feltShape.moveTo(x, y);
    else feltShape.lineTo(x, y);
  }
  feltShape.closePath();

  const feltGeo = new THREE.ExtrudeGeometry(feltShape, { depth: 3, bevelEnabled: false });
  const felt = new THREE.Mesh(feltGeo, feltMat);
  felt.position.z = 42;
  felt.receiveShadow = true;
  group.add(felt);

  // Legs
  const legGeo = new THREE.BoxGeometry(65, 65, 700);
  const legR = radius - 120;
  for (let i = 0; i < 6; i++) {
    const angle = (i * 60 + 30) * Math.PI / 180;
    const leg = new THREE.Mesh(legGeo, woodMat);
    leg.position.set(legR * Math.cos(angle), legR * Math.sin(angle), -350);
    leg.castShadow = true;
    group.add(leg);
  }

  return group;
}

// ========== SIMPLE DOMINO ==========
function createDomino(leftVal, rightVal) {
  const group = new THREE.Group();

  // Body
  const bodyGeo = new THREE.BoxGeometry(48, 24, 10);
  const body = new THREE.Mesh(bodyGeo, ivoryMat);
  body.castShadow = true;
  group.add(body);

  // Center groove
  const grooveGeo = new THREE.BoxGeometry(1, 17, 1);
  const groove = new THREE.Mesh(grooveGeo, blackMat);
  groove.position.z = 5;
  group.add(groove);

  // Pip positions on a 24x24 half
  const pipGrid = {
    TL: [9, 9], T: [9, 0], TR: [9, -9],
    L:  [0, 9], C: [0, 0], R:  [0, -9],
    BL: [-9, 9], B: [-9, 0], BR: [-9, -9]
  };

  const pipLayouts = [
    [],
    ['C'],
    ['TR', 'BL'],
    ['TR', 'C', 'BL'],
    ['TL', 'TR', 'BL', 'BR'],
    ['TL', 'TR', 'C', 'BL', 'BR'],
    ['TL', 'TR', 'L', 'R', 'BL', 'BR'],
    ['TL', 'TR', 'L', 'C', 'R', 'BL', 'BR']
  ];

  // Add pips
  const pipGeo = new THREE.SphereGeometry(2.4, 16, 16);

  // Left half pips
  const leftMat = new THREE.MeshPhongMaterial({ color: pipColors[leftVal] });
  for (const name of pipLayouts[leftVal]) {
    const pos = pipGrid[name];
    const pip = new THREE.Mesh(pipGeo, leftMat);
    pip.position.set(-12 + pos[0] * 0.5, pos[1] * 0.5, 4);
    pip.scale.z = 0.4;
    group.add(pip);
  }

  // Right half pips
  const rightMat = new THREE.MeshPhongMaterial({ color: pipColors[rightVal] });
  for (const name of pipLayouts[rightVal]) {
    const pos = pipGrid[name];
    const pip = new THREE.Mesh(pipGeo, rightMat);
    pip.position.set(12 + pos[0] * 0.5, pos[1] * 0.5, 4);
    pip.scale.z = 0.4;
    group.add(pip);
  }

  return group;
}

// ========== BUILD SCENE ==========
const table = createHexTable();
scene.add(table);

// ========== PLAY SEQUENCE ==========
const plays = [
  { left: 5, right: 5, x: 0, y: 0, rot: 0 },
  { left: 5, right: 3, x: 48, y: 0, rot: 0 },
  { left: 3, right: 7, x: 96, y: 0, rot: 0 },
  { left: 5, right: 2, x: -48, y: 0, rot: 0 },
  { left: 5, right: 0, x: 0, y: -48, rot: Math.PI/2 },
  { left: 5, right: 1, x: 0, y: 48, rot: Math.PI/2 },
];

const dominoes = [];
const domTargets = [];
let nextPlay = 0;
let playTimer = 0;
const playInterval = 2000;  // ms between plays

// ========== ANIMATION LOOP ==========
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);
  const dt = clock.getDelta() * 1000;

  // Camera slowly orbits
  const t = clock.getElapsedTime();
  camera.position.x = 1200 * Math.sin(t * 0.1);
  camera.position.y = -1200 * Math.cos(t * 0.1);
  camera.lookAt(0, 0, 45);

  // Play dominoes on timer
  playTimer += dt;
  if (playTimer > playInterval && nextPlay < plays.length) {
    const p = plays[nextPlay];
    const dom = createDomino(p.left, p.right);

    // Start high above table
    dom.position.set(p.x, p.y, 400);
    dom.rotation.z = p.rot;
    scene.add(dom);

    dominoes.push(dom);
    domTargets.push({ z: 50, done: false });
    nextPlay++;
    playTimer = 0;
  }

  // Animate falling dominoes
  for (let i = 0; i < dominoes.length; i++) {
    if (!domTargets[i].done) {
      const dom = dominoes[i];
      const target = domTargets[i].z;
      dom.position.z += (target - dom.position.z) * 0.08;
      if (Math.abs(dom.position.z - target) < 0.5) {
        dom.position.z = target;
        domTargets[i].done = true;
      }
    }
  }

  renderer.render(scene, camera);
}

animate();

// ========== RESIZE ==========
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
